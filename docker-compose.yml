services:
  db:
      image: postgres:15-alpine
      container_name: photostudia_db
      restart: always
      env_file:
        - .env
      volumes:
        - db_data:/var/lib/postgresql/data
      healthcheck:
        test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
        interval: 10s
        timeout: 5s
        retries: 5
  
  api:
    build: .
    container_name: photostudia_api
    restart: always
    command: >
      sh -c "python manage.py collectstatic --noinput &&
             python manage.py migrate &&
             gunicorn --bind 0.0.0.0:8000 core.wsgi:application"
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
  
  frontend:
    build: ./frontend
    container_name: photostudia_frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  db_data:
