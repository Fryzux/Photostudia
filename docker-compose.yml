services:
  redis:
    image: redis:alpine
    container_name: photostudia_redis
    restart: always
    ports:
      - "6379:6379"

  db:
    image: postgres:15-alpine
    container_name: photostudia_db
    restart: always
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./backups:/backups

  backend:
    build: .
    container_name: photostudia_backend
    restart: always
    command: >
      sh -c "python manage.py collectstatic --noinput &&
             python manage.py migrate &&
             python manage.py init_halls &&
             daphne -b 0.0.0.0 -p 8000 core.asgi:application"
    volumes:
      - .:/app
      - ./media:/app/media
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
      - redis

  celery:
    build: .
    container_name: photostudia_celery
    restart: always
    command: celery -A core worker -l INFO
    volumes:
      - .:/app
      - ./media:/app/media
    env_file:
      - .env
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
    depends_on:
      - redis
      - db

  celery-beat:
    build: .
    container_name: photostudia_celery_beat
    restart: always
    command: celery -A core beat -l INFO
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
    depends_on:
      - redis
      - db

volumes:
  db_data:
