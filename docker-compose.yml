services:
  db:
    image: postgres:15-alpine
    container_name: photostudia_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-photostudia}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-photostudia123}
      POSTGRES_DB: ${POSTGRES_DB:-photostudia_db}
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./backups:/backups

  backend:
    build: .
    container_name: photostudia_backend
    restart: always
    command: >
      sh -c "python manage.py check &&
             python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-photostudia}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-photostudia123}
      - POSTGRES_DB=${POSTGRES_DB:-photostudia_db}
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - SECRET_KEY=${SECRET_KEY:-django-insecure-key-for-dev}
      - DEBUG=1
    depends_on:
      - db

volumes:
  db_data:
