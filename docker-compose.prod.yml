services:
  redis:
    image: redis:alpine
    container_name: photostudia_redis_prod
    restart: always
    # NO ports exposed to public (Fix #12)
    command: redis-server --requirepass ${REDIS_PASSWORD:-photostudia_redis_pass}
    networks:
      - photostudia_network

  db:
    image: postgres:15-alpine
    container_name: photostudia_db_prod
    restart: always
    env_file:
      - .env
    # NO ports exposed to public (Fix #12)
    volumes:
      - db_data_prod:/var/lib/postgresql/data
    networks:
      - photostudia_network

  backend:
    build: .
    container_name: photostudia_backend_prod
    restart: always
    # Using Gunicorn (Fix #11)
    command: >
      sh -c "python manage.py collectstatic --noinput &&
             python manage.py migrate &&
             gunicorn --bind 0.0.0.0:8000 --workers 4 --threads 2 --preload core.wsgi:application"
    volumes:
      - ./media:/app/media
    ports:
      - "80:8000"
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://:photostudia_redis_pass@redis:6379/0
    depends_on:
      - db
      - redis
    networks:
      - photostudia_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:8000
    container_name: photostudia_frontend_prod
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - photostudia_network

  celery:
    build: .
    container_name: photostudia_celery_prod
    restart: always
    command: celery -A core worker -l INFO
    env_file:
      - .env
    environment:
      - CELERY_BROKER_URL=redis://:photostudia_redis_pass@redis:6379/0
    depends_on:
      - redis
      - db
    networks:
      - photostudia_network

  celery-beat:
    build: .
    container_name: photostudia_celery_beat_prod
    restart: always
    command: celery -A core beat -l INFO
    env_file:
      - .env
    environment:
      - CELERY_BROKER_URL=redis://:photostudia_redis_pass@redis:6379/0
    depends_on:
      - redis
      - db
    networks:
      - photostudia_network

networks:
  photostudia_network:
    driver: bridge

volumes:
  db_data_prod:
