{% extends "studio/base.html" %}
{% block title %}Мои заказы{% endblock %}
{% block content %}
<script>ensureAuth();</script>

<div class="row">
  <div class="card">
    <label>Дата</label><br/>
    <input id="date" class="input" type="date"/>
  </div>
  <div class="card">
    <button id="reload" class="btn primary">Показать</button>
    <div id="err" class="error" style="margin-top:8px"></div>
  </div>
</div>

<div class="card" style="margin-top:12px;">
  <table class="grid">
    <thead><tr><th>Время</th><th>Статус</th><th>Комментарий</th><th></th></tr></thead>
    <tbody id="rows"></tbody>
  </table>
</div>
{% endblock %}

{% block scripts %}
<script>
const API="{{ API_BASE_URL }}";
const elDate=qs("#date"), elRows=qs("#rows"), elErr=qs("#err");

function todayISO(){ const d=new Date(); const p=n=>String(n).padStart(2,"0"); return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}`; }

function render(items){
  elRows.innerHTML="";
  if (!items?.length){ elRows.innerHTML=`<tr><td colspan="4" class="muted">Нет заказов</td></tr>`; return; }
  for (const b of items){
    const btn = b.can_cancel ? `<button class="btn" data-c="${b.id}">Отменить</button>` : `<span class="muted">—</span>`;
    elRows.insertAdjacentHTML("beforeend", `<tr><td>${b.start}–${b.end}</td><td>${b.status}</td><td>${b.comment||""}</td><td>${btn}</td></tr>`);
  }
  qsa("button[data-c]").forEach(btn=>{
    btn.addEventListener("click", async ()=>{
      elErr.textContent="";
      try{
        await apiFetch(`${API}/bookings/${btn.dataset.c}/cancel`, { method:"POST" });
        await load();
      }catch(e){ elErr.textContent=e.message; }
    });
  });
}

async function load(){
  elErr.textContent="";
  try{
    const data = await apiFetch(`${API}/bookings/my?date=${encodeURIComponent(elDate.value)}`);
    render(data.bookings);
  }catch(e){ elErr.textContent=e.message; }
}

qs("#reload").addEventListener("click", load);
elDate.value=todayISO();
load();
</script>
{% endblock %}
