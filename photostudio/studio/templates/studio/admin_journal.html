{% extends "studio/base.html" %}
{% block title %}Журнал{% endblock %}
{% block content %}
<script>ensureAuth();</script>

<div class="card">
  <div class="row">
    <div>
      <label>Дата</label><br/>
      <input id="date" class="input" type="date"/>
    </div>
    <div>
      <label>Статус</label><br/>
      <select id="status" class="input">
        <option value="">Любой</option>
        <option value="pending">pending</option>
        <option value="confirmed">confirmed</option>
        <option value="cancelled">cancelled</option>
        <option value="done">done</option>
      </select>
    </div>
    <div>
      <label>Поиск</label><br/>
      <input id="q" class="input" placeholder="имя/телефон"/>
    </div>
    <div>
      <button id="reload" class="btn primary">Показать</button>
      <div id="err" class="error" style="margin-top:8px"></div>
    </div>
  </div>
</div>

<div class="card" style="margin-top:12px;">
  <table class="grid">
    <thead><tr><th>Клиент</th><th>Контакт</th><th>Время</th><th>Статус</th><th></th></tr></thead>
    <tbody id="rows"></tbody>
  </table>
</div>
{% endblock %}

{% block scripts %}
<script>
const API="{{ API_BASE_URL }}";
const elDate=qs("#date"), elStatus=qs("#status"), elQ=qs("#q"), elRows=qs("#rows"), elErr=qs("#err");

function todayISO(){ const d=new Date(); const p=n=>String(n).padStart(2,"0"); return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}`; }

function mustBeAdmin(){
  if (getRole() !== "admin") {
    elErr.textContent = "Доступ только для admin (роль приходит из login/register).";
    throw new Error("not admin");
  }
}

function render(items){
  elRows.innerHTML="";
  if (!items?.length){ elRows.innerHTML=`<tr><td colspan="5" class="muted">Нет записей</td></tr>`; return; }
  for (const b of items){
    elRows.insertAdjacentHTML("beforeend", `
      <tr>
        <td>${b.client_name||""}</td>
        <td>${b.client_contact||""}</td>
        <td>${b.date} ${b.start}–${b.end}</td>
        <td>${b.status}</td>
        <td>
          <button class="btn" data-confirm="${b.id}">Подтвердить</button>
          <button class="btn" data-cancel="${b.id}">Отменить</button>
        </td>
      </tr>
    `);
  }
  qsa("button[data-confirm]").forEach(btn=>btn.addEventListener("click", ()=>act("confirm", btn.dataset.confirm)));
  qsa("button[data-cancel]").forEach(btn=>btn.addEventListener("click", ()=>act("cancel", btn.dataset.cancel)));
}

async function act(type, id){
  elErr.textContent="";
  try{
    const url = type==="confirm" ? `${API}/admin/bookings/${id}/confirm` : `${API}/bookings/${id}/cancel`;
    await apiFetch(url, { method:"POST" });
    await load();
  }catch(e){ elErr.textContent=e.message; }
}

async function load(){
  elErr.textContent="";
  try{
    mustBeAdmin();
    const params = new URLSearchParams();
    params.set("date", elDate.value);
    if (elStatus.value) params.set("status", elStatus.value);
    if (elQ.value.trim()) params.set("q", elQ.value.trim());
    const data = await apiFetch(`${API}/admin/bookings?${params.toString()}`);
    render(data.bookings);
  }catch(e){
    if (e.message !== "not admin") elErr.textContent=e.message;
  }
}

qs("#reload").addEventListener("click", load);
elDate.value=todayISO();
load();
</script>
{% endblock %}
