<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>{% block title %}Фотостудия{% endblock %}</title>
  {% load static %}
  <link rel="stylesheet" href="{% static 'studio/app.css' %}">
</head>
<body>
  <header class="topbar">
    <a href="{% url 'schedule' %}">Расписание</a>
    <a href="{% url 'my_orders' %}">Мои заказы</a>
    <a href="{% url 'admin_journal' %}">Журнал</a>
    <a href="{% url 'ai' %}">AI</a>
    <span class="spacer"></span>
    <a href="{% url 'auth' %}">Вход/Регистрация</a>
    <button id="logout" class="btn">Выйти</button>
    <span id="me" class="muted"></span>
  </header>

  <main class="container">
    {% block content %}{% endblock %}
  </main>

  <script src="{% static 'studio/app.js' %}"></script>
  <script>
    function renderMe(){
      const t = getToken();
      const r = getRole();
      document.querySelector("#me").textContent = t ? `роль: ${r}` : "не авторизован";
    }
    document.querySelector("#logout").addEventListener("click", ()=>{
      setToken(""); setRole("client");
      renderMe();
      location.href = "{% url 'auth' %}";
    });
    renderMe();
  </script>

  {% block scripts %}{% endblock %}
</body>
</html>
