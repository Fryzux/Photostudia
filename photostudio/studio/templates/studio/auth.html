{% extends "studio/base.html" %}
{% block title %}Вход{% endblock %}
{% block content %}
<div class="row">
  <div class="card" style="flex:1;min-width:320px">
    <h3>Вход</h3>
    <input id="loginEmail" class="input" style="width:100%" placeholder="email"><br/><br/>
    <input id="loginPass" class="input" style="width:100%" placeholder="password" type="password"><br/><br/>
    <button id="loginBtn" class="btn primary">Войти</button>
    <div id="loginErr" class="error" style="margin-top:8px"></div>
  </div>

  <div class="card" style="flex:1;min-width:320px">
    <h3>Регистрация</h3>
    <input id="regName" class="input" style="width:100%" placeholder="Имя"><br/><br/>
    <input id="regEmail" class="input" style="width:100%" placeholder="email"><br/><br/>
    <input id="regPass" class="input" style="width:100%" placeholder="password" type="password"><br/><br/>
    <button id="regBtn" class="btn primary">Зарегистрироваться</button>
    <div id="regErr" class="error" style="margin-top:8px"></div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
const API = "{{ API_BASE_URL }}";

qs("#loginBtn").addEventListener("click", async ()=>{
  qs("#loginErr").textContent="";
  try{
    const data = await apiFetch(`${API}/auth/login`, {
      method:"POST",
      body:{ email:qs("#loginEmail").value.trim(), password:qs("#loginPass").value }
    });
    setToken(data.access_token); setRole(data.role || "client");
    location.href = "{% url 'schedule' %}";
  }catch(e){ qs("#loginErr").textContent = e.message; }
});

qs("#regBtn").addEventListener("click", async ()=>{
  qs("#regErr").textContent="";
  try{
    const data = await apiFetch(`${API}/auth/register`, {
      method:"POST",
      body:{
        name:qs("#regName").value.trim(),
        email:qs("#regEmail").value.trim(),
        password:qs("#regPass").value
      }
    });
    setToken(data.access_token); setRole(data.role || "client");
    location.href = "{% url 'schedule' %}";
  }catch(e){ qs("#regErr").textContent = e.message; }
});
</script>
{% endblock %}
