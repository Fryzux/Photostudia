{% extends "studio/base.html" %}
{% block title %}AI{% endblock %}
{% block content %}
<script>ensureAuth();</script>

<div class="card">
  <div class="row">
    <div>
      <label>С</label><br/>
      <input id="from" class="input" type="date"/>
    </div>
    <div>
      <label>По</label><br/>
      <input id="to" class="input" type="date"/>
    </div>
    <div>
      <button id="run" class="btn primary">Получить прогноз</button>
      <div id="err" class="error" style="margin-top:8px"></div>
      <div id="meta" class="muted" style="margin-top:8px"></div>
    </div>
  </div>
</div>

<div class="card" style="margin-top:12px;">
  <table class="grid">
    <thead><tr><th>Дата</th><th>Прогноз заказов</th></tr></thead>
    <tbody id="rows"></tbody>
  </table>
</div>
{% endblock %}

{% block scripts %}
<script>
const API="{{ API_BASE_URL }}";
const elFrom=qs("#from"), elTo=qs("#to"), elRows=qs("#rows"), elErr=qs("#err"), elMeta=qs("#meta");

function iso(d){ const p=n=>String(n).padStart(2,"0"); return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}`; }

function render(items){
  elRows.innerHTML="";
  if (!items?.length){ elRows.innerHTML=`<tr><td colspan="2" class="muted">Нет данных</td></tr>`; return; }
  for (const it of items){
    elRows.insertAdjacentHTML("beforeend", `<tr><td>${it.date}</td><td>${it.predicted_orders}</td></tr>`);
  }
}

async function run(){
  elErr.textContent=""; elMeta.textContent="";
  try{
    const data = await apiFetch(`${API}/ai/forecast?from=${encodeURIComponent(elFrom.value)}&to=${encodeURIComponent(elTo.value)}`);
    render(data.items);
    if (data.mae !== undefined) elMeta.textContent = `MAE: ${data.mae}`;
  }catch(e){ elErr.textContent=e.message; }
}

qs("#run").addEventListener("click", run);

const d=new Date(); const d2=new Date(d); d2.setDate(d.getDate()+6);
elFrom.value=iso(d); elTo.value=iso(d2);
run();
</script>
{% endblock %}
