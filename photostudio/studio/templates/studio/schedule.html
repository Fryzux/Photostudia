{% extends "studio/base.html" %}
{% block title %}Расписание{% endblock %}
{% block content %}
<script>ensureAuth();</script>

<div class="row">
  <div class="card">
    <label>Дата</label><br/>
    <input id="date" class="input" type="date"/>
  </div>
  <div class="card">
    <button id="reload" class="btn primary">Показать слоты</button>
    <div class="muted" style="margin-top:8px;">Рабочие часы: 10:00–21:00, шаг 60 минут.</div>
    <div id="err" class="error" style="margin-top:8px"></div>
  </div>
</div>

<div class="card" style="margin-top:12px;">
  <table class="grid">
    <thead><tr><th>Время</th><th>Статус</th><th></th></tr></thead>
    <tbody id="rows"></tbody>
  </table>
</div>

<div id="modal" class="card" style="margin-top:12px; display:none;">
  <h3>Заявка на бронирование</h3>
  <div class="muted" id="slotInfo"></div>
  <input id="comment" class="input" style="width:100%;margin-top:10px" placeholder="Комментарий"/>
  <div class="row" style="margin-top:10px">
    <button id="close" class="btn">Закрыть</button>
    <button id="send" class="btn primary">Отправить</button>
  </div>
  <div id="modalErr" class="error" style="margin-top:8px"></div>
</div>
{% endblock %}

{% block scripts %}
<script>
const API="{{ API_BASE_URL }}";
const elDate=qs("#date"), elRows=qs("#rows"), elErr=qs("#err");
let selected=null;

function todayISO(){ const d=new Date(); const p=n=>String(n).padStart(2,"0"); return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}`; }
function badge(isFree){ return isFree ? `<span class="badge free">Свободно</span>` : `<span class="badge busy">Занято</span>`; }

function render(slots){
  elRows.innerHTML="";
  if (!slots?.length){ elRows.innerHTML=`<tr><td colspan="3" class="muted">Нет слотов</td></tr>`; return; }
  for (const s of slots){
    const btn = s.is_free ? `<button class="btn primary" data-s='${JSON.stringify(s)}'>Создать заявку</button>` : `<span class="muted">—</span>`;
    elRows.insertAdjacentHTML("beforeend", `<tr><td>${s.start}–${s.end}</td><td>${badge(s.is_free)}</td><td>${btn}</td></tr>`);
  }
  qsa("button[data-s]").forEach(b=>{
    b.addEventListener("click", ()=>{
      selected = JSON.parse(b.dataset.s);
      qs("#slotInfo").textContent = `${elDate.value} ${selected.start}–${selected.end}`;
      qs("#modalErr").textContent="";
      qs("#modal").style.display="block";
    });
  });
}

async function load(){
  elErr.textContent="";
  try{
    const data = await apiFetch(`${API}/slots?date=${encodeURIComponent(elDate.value)}`);
    render(data.slots);
  }catch(e){ elErr.textContent=e.message; }
}

qs("#reload").addEventListener("click", load);
qs("#close").addEventListener("click", ()=>qs("#modal").style.display="none");
qs("#send").addEventListener("click", async ()=>{
  qs("#modalErr").textContent="";
  try{
    await apiFetch(`${API}/bookings`, {
      method:"POST",
      body:{ date: elDate.value, start:selected.start, end:selected.end, comment: qs("#comment").value.trim() }
    });
    qs("#modal").style.display="none";
    await load();
  }catch(e){ qs("#modalErr").textContent=e.message; }
});

elDate.value=todayISO();
load();
</script>
{% endblock %}
